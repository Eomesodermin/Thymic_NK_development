name: CI

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

jobs:
  mtclone-tests:
    name: mtclone unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install test dependencies
        run: python -m pip install --upgrade pip numpy pandas scipy anndata scikit-learn pytest
      - name: Run mtclone unit tests
        run: PYTHONPATH="$GITHUB_WORKSPACE/scripts" pytest scripts/mtclone/tests -v
